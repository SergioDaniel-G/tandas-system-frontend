<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Litzia´s Tanda</title>
    <link rel="stylesheet" href="/css/access.css?v=999">
</head>

<body class="login-page">

<div class="login-card">

    <header class="login-header">
        <div class="logo-circle">LT</div>
        <h1>Reset Password</h1>
        <p>Create a new secure password</p>
    </header>

    <form id="resetPasswordForm" class="login-form" method="post" action="/changePassword" novalidate>

        <div class="form-group">
            <label for="password">New password:</label>
            <div class="password-wrapper">
                <input type="password"
                       id="password"
                       name="password"
                       maxlength="12"
                       autocomplete="new-password"
                       required>
                <button type="button" id="togglePassword1" class="eye-btn">👁</button>
            </div>
        </div>

        <div class="form-group">
            <label for="cpassword">Confirm password:</label>
            <div class="password-wrapper">
                <input type="password"
                       id="cpassword"
                       name="cpassword"
                       maxlength="12"
                       autocomplete="new-password"
                       required>
                <button type="button" id="togglePassword2" class="eye-btn">👁</button>
            </div>
        </div>

        <button type="submit" class="btn-login">
            Update password
        </button>

        <div class="form-footer">
            <a href="/login" class="link-muted">
                ← Back to login
            </a>
        </div>

        <input type="hidden" id="reset-token" name="token">

    </form>
</div>

<footer class="footer-signature">
    <p>Developed and created by: <b>Litzia´s Tanda</b></p>
</footer>

<script src="/js/forgot-password.js?v=999"></script>
</body>
</html>
