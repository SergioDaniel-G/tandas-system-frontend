<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password recovery | Litzia´s Tanda</title>
    <link rel="stylesheet" href="/css/access.css?v=999">
</head>

<body class="login-page">

<div class="login-card">

    <header class="login-header">
        <div class="logo-circle">LT</div>
        <h1>Password recovery</h1>
        <p>Enter your email and phone number</p>
    </header>

    <form id="forgotPasswordForm" class="login-form" novalidate>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">
        </div>

        <div class="form-group">
            <label for="mobileNum">Phone number:</label>
            <input type="tel" id="mobileNum" name="mobileNum" maxlength="10">
        </div>

        <button type="submit" class="btn-login">
            Verify account
        </button>

        <div class="form-footer">
            <a href="/login.html" class="link-muted">
                ← Back to login
            </a>
        </div>

    </form>
</div>

<footer class="footer-signature">
    <p>Developed and created by: <b>Litzia´s Tanda</b></p>
</footer>

<script src="/js/forgot-password.js?v=999"></script>

</body>
</html>
